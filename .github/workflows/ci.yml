name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            upstream/silverscript -> target
      - name: Clone pinned silverscript upstream
        run: |
          git clone https://github.com/kaspanet/silverscript.git upstream/silverscript
          cd upstream/silverscript
          git checkout 2c46231
      - name: Build silverc
        run: cargo build --manifest-path upstream/silverscript/silverscript-lang/Cargo.toml --bin silverc
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
